<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>손금 AI | Cosmic Palmistry</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        :root {
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --accent: #f59e0b;
            --accent-glow: rgba(245, 158, 11, 0.4);
            --bg-deep: #030308;
            --bg-card: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-dim: rgba(248, 250, 252, 0.5);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
        }

        #app-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            position: relative;
            background: radial-gradient(circle at top right, #1e1b4b 0%, #030308 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Starfield Background */
        #star-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.4s ease;
            transform: translateY(20px);
            overflow-y: auto;
        }

        .screen.active {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        /* Typography */
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .subtitle {
            color: var(--text-dim);
            text-align: center;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        /* Buttons */
        .btn {
            background: none;
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #6d28d9 100%);
            color: white;
            box-shadow: 0 8px 24px var(--primary-glow);
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .btn-icon {
            width: 44px;
            height: 44px;
            padding: 0;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            color: white;
        }

        /* Navigation Bar */
        .top-nav {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        /* Intro Screen */
        #screen-intro {
            justify-content: center;
            align-items: center;
        }

        .logo-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 2rem;
        }

        .logo-orb {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, var(--primary) 0%, #1e1b4b 100%);
            border-radius: 50%;
            box-shadow: 0 0 40px var(--primary-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Upload Screen */
        .upload-area {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            background: var(--bg-card);
            border: 2px dashed var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 2rem;
            transition: border-color 0.3s ease;
        }

        .upload-area.active {
            border-color: var(--primary);
        }

        .palm-guide {
            position: absolute;
            width: 70%;
            height: 70%;
            opacity: 0.3;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* Scanning Screen */
        #screen-scanning {
            justify-content: center;
            align-items: center;
        }

        .scanner-box {
            position: relative;
            width: 280px;
            height: 380px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 2rem;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        #scan-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0.5) contrast(1.2);
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            box-shadow: 0 0 15px var(--accent-glow);
            animation: scanMove 3s linear infinite;
            z-index: 5;
        }

        @keyframes scanMove {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .scan-grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(139, 92, 246, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 2;
        }

        /* Result Screen */
        .result-scroll {
            width: 100%;
            padding-top: 1rem;
        }

        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            backdrop-filter: blur(12px);
        }

        .line-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .line-icon {
            width: 40px;
            height: 40px;
            background: rgba(139, 92, 246, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .line-name {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .line-score {
            margin-left: auto;
            color: var(--accent);
            font-weight: 700;
        }

        .line-desc {
            color: var(--text-dim);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .overall-score {
            text-align: center;
            margin-bottom: 2rem;
        }

        .stars {
            color: var(--accent);
            font-size: 1.5rem;
            margin-top: 0.5rem;
        }

        /* History Screen */
        .history-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            cursor: pointer;
        }

        .history-thumb {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
        }

        .history-info {
            flex: 1;
        }

        .history-date {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .history-summary {
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        /* Error Toast */
        .error-toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #dc2626;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            font-size: 0.9rem;
            z-index: 2000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            max-width: 90%;
            text-align: center;
        }
        .error-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Loading Dots */
        .loading-dots {
            display: flex;
            gap: 8px;
            margin-top: 1rem;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        /* Layout Helpers */
        .spacer { flex: 1; }
        .mt-4 { margin-top: 1rem; }
        .mb-4 { margin-bottom: 1rem; }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <canvas id="star-canvas"></canvas>

        <!-- Top Navigation -->
        <div class="top-nav">
            <button class="btn-icon" id="btn-back" style="visibility: hidden;" onclick="goBack()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <div style="font-weight: 600; font-size: 1.1rem; color: var(--text-dim)">Palmistry AI</div>
            <div style="width: 44px;"></div>
        </div>

        <!-- Screens -->

        <!-- 1. INTRO -->
        <div class="screen active" id="screen-intro">
            <div class="logo-container">
                <div class="logo-orb">🖐️</div>
            </div>
            <h1>Cosmic Palmistry</h1>
            <p class="subtitle">우주의 에너지가 담긴 당신의 손금,<br>인공지능으로 당신의 운명을 읽어드립니다.</p>
            
            <button class="btn btn-primary mb-4" onclick="goTo('upload')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 3v14"/><path d="m5 10 7 7 7-7"/><path d="M20 21H4"/></svg>
                분석 시작하기
            </button>
            <button class="btn btn-secondary" onclick="goTo('history')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
                과거 기록 보기
            </button>
        </div>

        <!-- 2. UPLOAD -->
        <div class="screen" id="screen-upload">
            <h2 style="text-align:center; margin-top: 3rem;">손 사진 업로드</h2>
            <p class="subtitle">밝은 곳에서 손바닥이 잘 보이도록<br>가이드에 맞춰 촬영해 주세요.</p>

            <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
                <img id="preview-img" alt="preview">
                <svg class="palm-guide" id="guide-svg" viewBox="0 0 200 250" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M50,200 Q40,150 45,100 Q50,50 60,40 Q70,30 80,45 Q90,60 85,100" stroke-dasharray="4"/>
                    <path d="M85,100 Q80,50 90,35 Q100,20 110,35 Q120,50 115,100" stroke-dasharray="4"/>
                    <path d="M115,100 Q120,55 130,45 Q140,35 150,50 Q160,65 145,110" stroke-dasharray="4"/>
                    <path d="M145,110 Q160,75 175,85 Q190,100 170,140 Q150,180 150,220" stroke-dasharray="4"/>
                    <path d="M50,200 Q70,240 100,245 Q130,240 150,220" stroke-dasharray="4"/>
                </svg>
                <div id="upload-placeholder" style="text-align: center; z-index: 5;">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">📸</div>
                    <p style="color: var(--text-dim)">탭하여 사진 촬영 또는 선택</p>
                </div>
            </div>

            <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none" onchange="handleFile(event)">
            
            <button class="btn btn-primary" id="btn-analyze" disabled onclick="startAnalysis()">
                분석 요청하기
            </button>
        </div>

        <!-- 3. SCANNING -->
        <div class="screen" id="screen-scanning">
            <div class="scanner-box">
                <div class="scan-grid"></div>
                <div class="scan-line"></div>
                <img id="scan-img" src="" alt="scanning">
            </div>
            <h2 id="scanning-text">이미지 분석 중...</h2>
            <div class="loading-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <p class="mt-4" style="color: var(--text-dim); text-align: center; font-size: 0.85rem;">
                인공지능이 손금의 패턴을 분석하고 있습니다.<br>잠시만 기다려 주세요.
            </p>
        </div>

        <!-- 4. RESULT -->
        <div class="screen" id="screen-result">
            <div class="result-scroll">
                <div class="overall-score">
                    <div style="font-size: 0.9rem; color: var(--accent); font-weight: 700; letter-spacing: 2px;">OVERALL DESTINY</div>
                    <div id="result-overall-title" style="font-size: 1.8rem; font-weight: 700; margin: 0.5rem 0;">찬란한 미래의 빛</div>
                    <div class="stars" id="result-stars">★★★★☆</div>
                </div>

                <div id="result-cards-container">
                    <!-- Cards will be injected here -->
                </div>

                <div class="result-card" style="border: 1px solid var(--accent); background: rgba(245, 158, 11, 0.05);">
                    <div class="line-header">
                        <div class="line-icon">🔮</div>
                        <div class="line-name">종합 총평</div>
                    </div>
                    <p class="line-desc" id="result-summary"></p>
                    <div style="display: flex; gap: 1rem; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.05)">
                        <div style="flex: 1;">
                            <div style="font-size: 0.75rem; color: var(--text-dim)">행운의 색</div>
                            <div style="font-weight: 700; color: var(--accent)" id="result-lucky-color">-</div>
                        </div>
                        <div style="flex: 1;">
                            <div style="font-size: 0.75rem; color: var(--text-dim)">행운의 숫자</div>
                            <div style="font-weight: 700; color: var(--primary)" id="result-lucky-number">-</div>
                        </div>
                    </div>
                </div>

                <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
                    <button class="btn btn-secondary" style="flex: 1" onclick="goTo('intro')">홈으로</button>
                    <button class="btn btn-primary" style="flex: 1.5" onclick="shareResult()">결과 공유하기</button>
                </div>
            </div>
        </div>

        <!-- 5. HISTORY -->
        <div class="screen" id="screen-history">
            <h2 style="margin-top: 3rem; margin-bottom: 1rem;">운명의 발자취</h2>
            <p class="subtitle" style="text-align: left; margin-bottom: 1.5rem;">이전에 분석했던 손금 기록들입니다.</p>
            
            <div id="history-list" style="flex: 1;">
                <!-- History items here -->
            </div>

            <button class="btn btn-secondary mt-4" onclick="clearHistory()">기록 모두 지우기</button>
        </div>

    </div>

    <!-- Error Toast -->
    <div class="error-toast" id="error-toast"></div>

    <script>
        // --- State & Config ---
        const HISTORY_KEY = 'palm_history_v2';
        const MAX_IMAGE_SIZE = 1200; // Max dimension for compression

        let currentScreen = 'intro';
        let history = [];
        try { history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch(e) { history = []; }
        let currentImageB64 = null;
        let screenStack = ['intro'];
        let isAnalyzing = false;

        // --- Starfield Background ---
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for(let i = 0; i < 150; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5,
                    opacity: Math.random(),
                    speed: Math.random() * 0.02 + 0.005
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => {
                star.opacity += star.speed;
                if(star.opacity > 1 || star.opacity < 0) star.speed *= -1;
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, star.opacity)})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(drawStars);
        }

        window.addEventListener('resize', initStars);
        initStars();
        drawStars();

        // --- Navigation ---
        function goTo(screenId, direction = 'forward') {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(`screen-${screenId}`);
            target.classList.add('active');
            
            const backBtn = document.getElementById('btn-back');
            if(screenId === 'intro') {
                backBtn.style.visibility = 'hidden';
                screenStack = ['intro'];
            } else {
                backBtn.style.visibility = 'visible';
                if(direction === 'forward') screenStack.push(screenId);
            }
            
            currentScreen = screenId;
            if(screenId === 'history') renderHistory();
        }

        function goBack() {
            if(screenStack.length > 1) {
                screenStack.pop();
                const prev = screenStack[screenStack.length - 1];
                goTo(prev, 'backward');
                screenStack.pop(); // Remove it because goTo will push it again
                screenStack.push(prev);
            }
        }

        // --- Image Compression ---
        function compressImage(file, maxSize) {
            return new Promise((resolve) => {
                const img = new Image();
                const url = URL.createObjectURL(file);
                img.onload = () => {
                    URL.revokeObjectURL(url);
                    let w = img.width, h = img.height;
                    if (w > maxSize || h > maxSize) {
                        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
                        else { w = Math.round(w * maxSize / h); h = maxSize; }
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = w;
                    canvas.height = h;
                    const ctx2 = canvas.getContext('2d');
                    ctx2.drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.85));
                };
                img.onerror = () => {
                    URL.revokeObjectURL(url);
                    // Fallback: read as-is
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(file);
                };
                img.src = url;
            });
        }

        // --- File Handling ---
        async function handleFile(e) {
            const file = e.target.files[0];
            if(!file) return;

            try {
                const b64 = await compressImage(file, MAX_IMAGE_SIZE);
                currentImageB64 = b64;
                
                const preview = document.getElementById('preview-img');
                preview.src = b64;
                preview.style.display = 'block';
                
                document.getElementById('upload-placeholder').style.display = 'none';
                document.getElementById('guide-svg').style.opacity = '0.1';
                document.getElementById('btn-analyze').disabled = false;
            } catch(err) {
                console.error('File handling error:', err);
                showError('이미지를 불러오지 못했습니다.');
            }
        }

        // --- Error Toast ---
        function showError(msg) {
            const toast = document.getElementById('error-toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        // --- API & Analysis ---
        async function startAnalysis() {
            if (isAnalyzing) return;
            isAnalyzing = true;

            goTo('scanning');
            document.getElementById('scan-img').src = currentImageB64;

            const messages = [
                "이미지 텍스처 분석 중...",
                "생명선의 흐름 파악 중...",
                "두뇌선의 깊이 측정 중...",
                "감정선의 에너지 리딩 중...",
                "운명의 좌표 계산 중...",
                "우주의 메시지 수신 중...",
                "운명의 별빛을 수집 중..."
            ];
            
            let msgIdx = 0;
            const msgInterval = setInterval(() => {
                msgIdx = (msgIdx + 1) % messages.length;
                const el = document.getElementById('scanning-text');
                if (el) el.innerText = messages[msgIdx];
            }, 2000);

            try {
                const result = await callBackendApiWithRetry(currentImageB64, 2);
                clearInterval(msgInterval);
                
                // Save to history (thumbnail only, not full image)
                const historyItem = {
                    id: Date.now(),
                    date: new Date().toLocaleString(),
                    image: currentImageB64,
                    result: result
                };
                history.unshift(historyItem);
                // Keep last 10 to avoid localStorage quota
                const toSave = history.slice(0, 10);
                try { localStorage.setItem(HISTORY_KEY, JSON.stringify(toSave)); } catch(e) { console.warn('localStorage full'); }
                
                renderResult(result);
                goTo('result');
            } catch (error) {
                console.error('Analysis failed:', error);
                clearInterval(msgInterval);
                showError(error.message || '분석 중 오류가 발생했습니다.');
                goTo('upload');
            } finally {
                isAnalyzing = false;
            }
        }

        async function callBackendApiWithRetry(base64Data, maxRetries) {
            let lastError;
            for (let attempt = 0; attempt <= maxRetries; attempt++) {
                try {
                    return await callBackendApi(base64Data);
                } catch (err) {
                    lastError = err;
                    const is429 = err.message && err.message.includes('너무 많습니다');
                    const waitMs = is429 ? (attempt + 1) * 10000 : (attempt + 1) * 3000;
                    console.warn(`Attempt ${attempt + 1} failed:`, err.message, `waiting ${waitMs}ms`);
                    
                    if (attempt < maxRetries) {
                        // Update scanning text to show wait status
                        const el = document.getElementById('scanning-text');
                        if (el) el.innerText = is429 ? '서버가 바쁩니다. 잠시 대기 중...' : '재시도 중...';
                        await new Promise(r => setTimeout(r, waitMs));
                    }
                }
            }
            throw lastError;
        }

        async function callBackendApi(base64Data) {
            const cleanB64 = base64Data.split(',')[1];
            const mimeType = base64Data.split(',')[0].split(':')[1].split(';')[0] || 'image/jpeg';

            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 55000); // 55s to match server 60s

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ imageB64: cleanB64, mimeType }),
                    signal: controller.signal
                });
                clearTimeout(timeout);

                if (!response.ok) {
                    let errMsg = '서버 오류가 발생했습니다.';
                    try {
                        const errData = await response.json();
                        errMsg = errData.error || errMsg;
                    } catch(e) {}
                    throw new Error(errMsg);
                }
                
                return await response.json();
            } catch (err) {
                clearTimeout(timeout);
                if (err.name === 'AbortError') {
                    throw new Error('요청 시간이 초과되었습니다. 다시 시도해 주세요.');
                }
                throw err;
            }
        }

        // --- Rendering ---
        function renderResult(data) {
            document.getElementById('result-overall-title').innerText = data.overall_title;
            document.getElementById('result-stars').innerText = '★'.repeat(data.stars) + '☆'.repeat(5 - data.stars);
            document.getElementById('result-summary').innerText = data.summary;
            document.getElementById('result-lucky-color').innerText = data.lucky_color;
            document.getElementById('result-lucky-number').innerText = data.lucky_number;

            const container = document.getElementById('result-cards-container');
            container.innerHTML = '';

            data.lines.forEach(line => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <div class="line-header">
                        <div class="line-icon">${line.icon}</div>
                        <div class="line-name">${line.name}</div>
                        <div class="line-score">${'★'.repeat(line.score)}</div>
                    </div>
                    <p class="line-desc">${line.desc}</p>
                `;
                container.appendChild(card);
            });
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            
            if(history.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:var(--text-dim); margin-top:3rem;">아직 기록이 없습니다.</p>';
                return;
            }

            history.forEach(item => {
                const el = document.createElement('div');
                el.className = 'history-item';
                el.onclick = () => {
                    renderResult(item.result);
                    currentImageB64 = item.image; // For re-viewing or sharing
                    goTo('result');
                };
                el.innerHTML = `
                    <img src="${item.image}" class="history-thumb">
                    <div class="history-info">
                        <div class="history-summary">${item.result.overall_title}</div>
                        <div class="history-date">${item.date}</div>
                    </div>
                    <div style="color: var(--accent)">${'★'.repeat(item.result.stars)}</div>
                `;
                list.appendChild(el);
            });
        }

        function clearHistory() {
            if(confirm("모든 기록을 삭제할까요?")) {
                history = [];
                localStorage.removeItem(HISTORY_KEY);
                renderHistory();
            }
        }

        // --- Share ---
        async function shareResult() {
            const title = document.getElementById('result-overall-title')?.innerText || '손금 분석';
            const summary = document.getElementById('result-summary')?.innerText || '';
            const text = `AI가 분석한 나의 손금 결과: "${title}"\n${summary}\n#손금AI #CosmicPalmistry`;
            
            if (navigator.share) {
                try {
                    await navigator.share({ title: 'Cosmic Palmistry AI', text });
                } catch (err) { /* user cancelled */ }
            } else {
                try {
                    await navigator.clipboard.writeText(text);
                    showError('클립보드에 복사되었습니다! ✨'); // Reuse toast for info too
                } catch(e) {}
            }
        }
    </script>
