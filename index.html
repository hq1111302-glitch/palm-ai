<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>손금AI - 당신의 운명을 읽어드립니다</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="palmApp">
        <canvas id="starsCanvas"></canvas>

        <!-- INTRO -->
        <div class="screen active" id="introScreen">
            <div class="logo-orb">🖐</div>
            <div class="badge">AI Palm Reading</div>
            <div class="title" style="margin-bottom:12px">손금AI</div>
            <p class="subtitle" style="margin-bottom:44px">당신의 손 안에 담긴 운명을<br>인공지능이 읽어드립니다</p>
            <button class="btn-primary" onclick="goTo('uploadScreen')">✦ &nbsp;손금 읽기 시작</button>
            <button class="btn-ghost" onclick="showHistory()">📜 &nbsp;분석 기록 보기</button>
            <p style="color:rgba(255,255,255,0.25);font-size:11px;margin-top:18px">손바닥을 밝은 곳에서 펼쳐 촬영해주세요</p>
        </div>

        <!-- UPLOAD -->
        <div class="screen" id="uploadScreen">
            <button class="btn-back" onclick="goTo('introScreen')">←</button>
            <div class="badge">Step 1</div>
            <h2 style="font-size:22px;font-weight:600;color:#fff;margin-bottom:8px">손바닥을 찍어주세요</h2>
            <p class="subtitle" style="margin-bottom:28px">손금이 잘 보이도록 밝은 곳에서<br>손을 펼쳐 촬영해주세요</p>
            <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
                <div class="corner c-tl"></div><div class="corner c-tr"></div>
                <div class="corner c-bl"></div><div class="corner c-br"></div>
                <div class="palm-guide">
                    <svg class="palm-svg" viewBox="0 0 100 120">
                        <path d="M50,110 Q30,110 20,80 Q10,50 20,30 Q25,20 35,25 Q45,30 40,50 Q40,60 50,60 Q60,60 60,50 Q55,30 65,25 Q75,20 80,30 Q90,50 80,80 Q70,110 50,110" />
                    </svg>
                </div>
                <div class="upload-icon">🖐️</div>
                <div class="upload-hint">탭하여 사진 선택<br>또는 카메라 촬영</div>
            </div>
            <input id="fileInput" type="file" accept="image/*" capture="environment" style="display:none">
            <button class="btn-primary" onclick="document.getElementById('fileInput').click()">📷 &nbsp;사진 촬영 / 선택</button>
            <div id="uploadErr" class="err"></div>
        </div>

        <!-- SCANNING -->
        <div class="screen" id="scanningScreen">
            <div class="badge" style="margin-bottom:20px">Analyzing</div>
            <div class="scan-wrap">
                <canvas id="scanCanvas" width="260" height="260"></canvas>
                <div class="scan-glow"></div>
            </div>
            <div class="scan-text" id="scanText">손금을 읽는 중...</div>
            <div class="dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>

        <!-- RESULT -->
        <div class="screen" id="resultScreen">
            <button class="btn-back" onclick="resetApp()">←</button>
            <div class="result-header">
                <img id="thumbImg" class="thumb" src="" alt="hand" style="display:none">
                <div class="badge">Your Palm Report</div>
                <div style="font-size:18px;font-weight:600;color:#fff">✦ 손금 분석 결과 ✦</div>
                <div class="stars" id="starsDisplay">★★★★☆</div>
            </div>
            <div id="cardsContainer" style="width:100%"></div>
            <div id="summaryCard" class="summary-card" style="display:none"></div>
            <div style="width:100%">
                <button class="btn-primary" id="shareBtn">📤 &nbsp;결과 공유하기</button>
                <button class="btn-ghost" onclick="resetApp()">🔄 &nbsp;다시 분석하기</button>
            </div>
        </div>

        <!-- HISTORY -->
        <div class="screen" id="historyScreen">
            <button class="btn-back" onclick="goTo('introScreen')">←</button>
            <div class="badge">Scan History</div>
            <h2 style="font-size:22px;font-weight:600;color:#fff;margin-bottom:8px">분석 기록</h2>
            <p class="subtitle">지금까지 분석한 결과들입니다</p>
            <div id="historyList" class="history-list">
                <!-- History items will be injected here -->
            </div>
            <button class="btn-ghost" style="margin-top: 30px;" onclick="clearHistory()">🗑️ &nbsp;전체 기록 삭제</button>
        </div>
    </div>
    <script type="module" src="./main.js"></script>
</body>
</html>
